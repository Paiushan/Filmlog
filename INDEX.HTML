<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>FilmLog</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,sans-serif;background:#0a0a0a;color:#f5f5f0;padding:20px;min-height:100vh}h1{text-align:center;font-size:24px;margin-bottom:20px}h1 span{color:#e8c47c}.tabs{display:flex;gap:8px;justify-content:center;margin-bottom:20px}.tab{padding:10px 20px;background:#1a1a1a;border:none;border-radius:20px;color:#888;font-size:14px}.tab.active{background:#e8c47c;color:#0a0a0a}.page{display:none}.page.active{display:block}.card{background:#141414;border-radius:12px;padding:16px;margin-bottom:12px}.card-title{font-size:16px;font-weight:600}.card-sub{font-size:13px;color:#888;margin-top:4px}.badge{display:inline-block;padding:4px 10px;border-radius:10px;font-size:11px;background:#e8c47c33;color:#e8c47c;margin-left:8px}.btn{padding:10px 16px;background:#e8c47c;border:none;border-radius:10px;color:#0a0a0a;font-size:14px;font-weight:600;margin-top:12px;width:100%}.btn-sm{width:auto;padding:8px 14px;font-size:12px;margin-right:8px;margin-top:10px}.btn-danger{background:transparent;border:1px solid #e8646433;color:#e86464}.empty{text-align:center;padding:40px;color:#666}.meter-ev{text-align:center;padding:20px 0}.meter-ev-val{font-size:48px;color:#e8c47c}.chips{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0}.chip{padding:8px 14px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#888;font-size:13px}.chip.active{background:#f5f5f0;color:#0a0a0a;border-color:#f5f5f0}.chip.accent{background:#e8c47c;color:#0a0a0a;border-color:#e8c47c}.combo{display:flex;border-bottom:1px solid #222}.combo-cell{flex:1;padding:12px;text-align:center;font-size:15px}.combo-cell.ap{color:#7ca8e8}.combo-cell.sp{color:#e8a84c}.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);align-items:flex-end;justify-content:center;z-index:100}.modal.open{display:flex}.modal-box{background:#141414;width:100%;max-width:400px;border-radius:20px 20px 0 0;padding:24px}.modal-title{font-size:18px;font-weight:600;text-align:center;margin-bottom:20px}.form-group{margin-bottom:14px}.form-group label{display:block;font-size:11px;color:#666;margin-bottom:6px}.form-group input,.form-group select,.form-group textarea{width:100%;padding:12px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#f5f5f0;font-size:15px}.form-group textarea{min-height:60px;resize:none}.form-row{display:flex;gap:12px}.form-row .form-group{flex:1}.form-actions{display:flex;gap:12px;margin-top:20px}.form-actions button{flex:1;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:600}.cancel-btn{background:#1a1a1a;color:#f5f5f0}.save-btn{background:#e8c47c;color:#0a0a0a}.presets{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}.preset{padding:6px 10px;background:#1a1a1a;border:1px solid #333;border-radius:12px;font-size:11px;color:#888}
</style>
</head>
<body>
<h1>Film<span>Log</span></h1>
<div class="tabs"><button class="tab active" id="tabRolls">Rolls</button><button class="tab" id="tabMeter">Posemetre</button></div>
<div class="page active" id="pageRolls"><div id="rollsList"></div><button class="btn" id="btnAdd">+ Nouvelle pellicule</button></div>
<div class="page" id="pageMeter"><div class="meter-ev"><div class="meter-ev-val" id="evVal">12</div><div style="font-size:12px;color:#666;margin-top:8px">EV</div></div><div style="font-size:11px;color:#666;margin-bottom:6px">SCENE</div><div class="chips" id="sceneChips"></div><div style="font-size:11px;color:#666;margin-bottom:6px">ISO</div><div class="chips" id="isoChips"></div><div style="background:#141414;border-radius:12px;overflow:hidden;margin-top:16px"><div class="combo" style="border-bottom:1px solid #333"><div class="combo-cell" style="font-size:11px;color:#666">Ouverture</div><div class="combo-cell" style="font-size:11px;color:#666">Vitesse</div></div><div id="comboList"></div></div></div>
<div class="modal" id="modal"><div class="modal-box"><div class="modal-title">Nouvelle pellicule</div><div class="form-group"><label>Appareil</label><select id="inCam"><option>Nikon S2</option><option>Voigtlander Bessa II</option><option>Autre</option></select></div><div class="form-group"><label>Film</label><input type="text" id="inFilm" placeholder="Ex: Portra 400"><div class="presets" id="presets"></div></div><div class="form-row"><div class="form-group"><label>ISO</label><select id="inIso"><option>100</option><option>200</option><option selected>400</option><option>800</option></select></div><div class="form-group"><label>Format</label><select id="inFmt"><option>35mm</option><option>120</option></select></div></div><div class="form-group"><label>Notes</label><textarea id="inNotes" placeholder="Lieu, conditions..."></textarea></div><div class="form-actions"><button class="cancel-btn" id="btnCancel">Annuler</button><button class="save-btn" id="btnSave">Enregistrer</button></div></div></div>
<script>
var rolls=JSON.parse(localStorage.getItem("flr")||"[]"),ev=12,iso=400,scenes=[{e:15,l:"Neige"},{e:14,l:"Plage"},{e:12,l:"Soleil"},{e:10,l:"Nuageux"},{e:8,l:"Ombre"},{e:6,l:"Interieur"},{e:4,l:"Soir"},{e:1,l:"Nuit"}],isos=[100,200,400,800,1600],films=[{n:"Portra 400",i:"400"},{n:"Tri-X 400",i:"400"},{n:"HP5 Plus",i:"400"},{n:"Ektar 100",i:"100"}];
document.getElementById("tabRolls").onclick=function(){document.getElementById("tabRolls").className="tab active";document.getElementById("tabMeter").className="tab";document.getElementById("pageRolls").className="page active";document.getElementById("pageMeter").className="page"};
document.getElementById("tabMeter").onclick=function(){document.getElementById("tabMeter").className="tab active";document.getElementById("tabRolls").className="tab";document.getElementById("pageMeter").className="page active";document.getElementById("pageRolls").className="page"};
document.getElementById("btnAdd").onclick=function(){document.getElementById("modal").className="modal open"};
document.getElementById("btnCancel").onclick=function(){document.getElementById("modal").className="modal"};
document.getElementById("btnSave").onclick=function(){var r={id:Date.now(),film:document.getElementById("inFilm").value||"Film",cam:document.getElementById("inCam").value,iso:document.getElementById("inIso").value,fmt:document.getElementById("inFmt").value,notes:document.getElementById("inNotes").value,st:"loaded"};rolls.unshift(r);localStorage.setItem("flr",JSON.stringify(rolls));document.getElementById("modal").className="modal";document.getElementById("inFilm").value="";document.getElementById("inNotes").value="";renderRolls()};
function renderRolls(){var c=document.getElementById("rollsList");if(rolls.length===0){c.innerHTML='<div class="empty">Aucune pellicule</div>';return}var h="";for(var i=0;i<rolls.length;i++){var r=rolls[i],sl={loaded:"En cours",exposed:"Exposee",lab:"Au labo",done:"Developpee"},ns={loaded:"exposed",exposed:"lab",lab:"done"},nl={loaded:"Exposee",exposed:"Au labo",lab:"Developpee"};h+='<div class="card"><div class="card-title">'+r.film+'<span class="badge">'+sl[r.st]+'</span></div><div class="card-sub">'+r.cam+" - ISO "+r.iso+" - "+r.fmt+"</div>";if(r.notes)h+='<div style="margin-top:8px;font-size:12px;color:#888;font-style:italic">'+r.notes+"</div>";if(ns[r.st])h+='<button class="btn btn-sm" onclick="upSt('+r.id+",'"+ns[r.st]+"')\">"+nl[r.st]+"</button>";h+='<button class="btn btn-sm btn-danger" onclick="delR('+r.id+')">Suppr</button></div>'}c.innerHTML=h}
window.upSt=function(id,st){for(var i=0;i<rolls.length;i++)if(rolls[i].id===id){rolls[i].st=st;break}localStorage.setItem("flr",JSON.stringify(rolls));renderRolls()};
window.delR=function(id){if(confirm("Supprimer?")){rolls=rolls.filter(function(r){return r.id!==id});localStorage.setItem("flr",JSON.stringify(rolls));renderRolls()}};
function renderScenes(){var h="";for(var i=0;i<scenes.length;i++){var s=scenes[i];h+='<span class="chip'+(s.e===ev?" accent":"")+'" onclick="setEV('+s.e+')">'+s.l+"</span>"}document.getElementById("sceneChips").innerHTML=h}
function renderIsos(){var h="";for(var i=0;i<isos.length;i++){var v=isos[i];h+='<span class="chip'+(v===iso?" active":"")+'" onclick="setISO('+v+')">'+v+"</span>"}document.getElementById("isoChips").innerHTML=h}
window.setEV=function(v){ev=v;document.getElementById("evVal").textContent=v;renderScenes();renderCombos()};
window.setISO=function(v){iso=v;renderIsos();renderCombos()};
function renderCombos(){var aps=[2,2.8,4,5.6,8,11,16],sps=[{v:.001,l:"1/1000"},{v:.002,l:"1/500"},{v:.004,l:"1/250"},{v:.008,l:"1/125"},{v:.0167,l:"1/60"},{v:.0333,l:"1/30"},{v:.0667,l:"1/15"},{v:.125,l:"1/8"},{v:.25,l:"1/4"},{v:.5,l:"1/2"},{v:1,l:"1s"},{v:2,l:"2s"},{v:4,l:"4s"},{v:8,l:"8s"},{v:15,l:"15s"},{v:30,l:"30s"}],h="",ev100=ev+Math.log(iso/100)/Math.log(2);for(var i=0;i<aps.length;i++){var f=aps[i],t=f*f/Math.pow(2,ev100),cl=sps[0],md=999;for(var j=0;j<sps.length;j++){var d=Math.abs(Math.log(t)-Math.log(sps[j].v));if(d<md){md=d;cl=sps[j]}}if(md<.7)h+='<div class="combo"><div class="combo-cell ap">f/'+f+'</div><div class="combo-cell sp">'+cl.l+"</div></div>"}document.getElementById("comboList").innerHTML=h}
function renderPresets(){var h="";for(var i=0;i<films.length;i++){var f=films[i];h+='<span class="preset" onclick="selFilm(\''+f.n+"','"+f.i+"')\">"+f.n+"</span>"}document.getElementById("presets").innerHTML=h}
window.selFilm=function(n,i){document.getElementById("inFilm").value=n;document.getElementById("inIso").value=i};
renderRolls();renderScenes();renderIsos();renderCombos();renderPresets();
</script>
</body>
</html>
